name: venteapp
description: "ARIKE — application de gestion commerciale offline-first."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  get_it: ^8.0.3
  drift: ^2.34.0
  sqlite3: ^3.1.5
  path_provider: ^2.1.5
  path: ^1.9.1
  bcrypt: ^1.1.3
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  uuid: ^4.5.1
  crypto: ^3.0.6
  google_fonts: ^6.2.1
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4
  shared_preferences: ^2.5.3
  share_plus: ^10.1.4
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  file_picker: ^8.1.7
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  printing: ^5.14.2
  pdf: ^3.11.3
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  flutter_local_notifications: ^19.0.0
  local_auth_android: ^1.0.56
  local_auth_darwin: ^1.6.1
  speech_to_text: ^7.0.0
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.4.15
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#0B6E4F"
  adaptive_icon_foreground: assets/images/app_icon_foreground.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0B6E4F"
  image: assets/images/splash_logo.png
  android_12:
    color: "#0B6E4F"
    image: assets/images/splash_logo.png
  ios: true
  android: true
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
